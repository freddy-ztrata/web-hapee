<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Render helper · noindex</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{background:#000;width:100%;height:100%;overflow:hidden}
:root{
  --accent:#FA5000;--accent-alt:#CD2349;
  --fd:'Bebas Neue',sans-serif;
  --fb:'Plus Jakarta Sans',sans-serif;
  --fm:'JetBrains Mono',monospace;
}
body{font-family:var(--fb)}

/* GFX base — no scaling here */
.gfx{position:absolute;overflow:hidden;color:#fff;font-family:var(--fb);top:0;left:0}
.gfx.post{width:1080px;height:1080px}
.gfx.story{width:1080px;height:1920px}
.gfx.linkedin{width:1200px;height:627px}

.gfx-inner{position:absolute;inset:0;padding:80px;display:flex;flex-direction:column}
.gfx.story .gfx-inner{padding:120px 90px}
.gfx.linkedin .gfx-inner{padding:60px 70px}

.gfx-top{display:flex;justify-content:space-between;align-items:flex-start}
.gfx-logo{display:flex;align-items:center;gap:14px}
.gfx-logo-mark{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,#FA5000,#CD2349);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:2rem;color:#fff;box-shadow:0 10px 25px rgba(250,80,0,.45)}
.gfx-logo-text{font-family:var(--fd);font-size:1.5rem;color:#fff;letter-spacing:1px}
.gfx-issue{font-family:var(--fm);font-size:.85rem;color:rgba(255,255,255,.55);letter-spacing:2px;text-transform:uppercase;text-align:right;line-height:1.4}
.gfx-issue strong{display:block;color:var(--accent);font-weight:700;letter-spacing:2.5px}

.gfx-cat{font-family:var(--fm);font-size:1rem;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:700;display:flex;align-items:center;gap:14px;margin-top:60px}
.gfx-cat::before{content:'';width:60px;height:3px;background:var(--accent)}
.gfx.story .gfx-cat{font-size:1.3rem;margin-top:120px}

.gfx-title{font-family:var(--fd);color:#fff;letter-spacing:-1px;line-height:.94;margin-top:24px;font-weight:400}
.gfx.post .gfx-title{font-size:5.6rem}
.gfx.story .gfx-title{font-size:7rem}
.gfx.linkedin .gfx-title{font-size:3.8rem}

.gfx-sub{color:rgba(255,255,255,.78);font-size:1.3rem;margin-top:24px;max-width:80%;line-height:1.5;font-weight:400}
.gfx.story .gfx-sub{font-size:1.6rem;max-width:90%}
.gfx.linkedin .gfx-sub{font-size:1.1rem;margin-top:18px;max-width:70%}

.gfx-spacer{flex:1}

.gfx-bottom{display:flex;justify-content:space-between;align-items:center;font-family:var(--fm);font-size:.95rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.6)}
.gfx-hashtag{color:var(--accent);font-weight:700}
.gfx-url{font-weight:600;color:#fff}
.gfx.linkedin .gfx-bottom{font-size:.78rem}

.gfx-corner{position:absolute;font-family:var(--fm);font-size:.78rem;letter-spacing:2px;color:rgba(255,255,255,.4);text-transform:uppercase;font-weight:600}
.cnr-bl{bottom:30px;left:30px}

/* THEMES (same as rrss-templates) */
.theme-mcp{background:radial-gradient(circle at 35% 45%,#2a1a14 0%,#0a0a0a 80%)}
.theme-mcp .art-svg{position:absolute;inset:0;width:100%;height:100%;opacity:.5;pointer-events:none}
.theme-voice{background:linear-gradient(135deg,#1a0d0d 0%,#0a0a0a 100%)}
.theme-voice .v-wave{position:absolute;left:0;right:0;bottom:0;height:65%;display:flex;align-items:flex-end;justify-content:center;gap:8px;padding:0 80px 80px;pointer-events:none}
.gfx.linkedin .theme-voice .v-wave{padding:0 60px 60px;gap:5px;height:75%}
.theme-voice .v-bar{flex:1;background:linear-gradient(180deg,#FA5000,#CD2349);border-radius:8px;opacity:.85;min-width:6px}
.theme-voice .v-bar:nth-child(1){height:22%}
.theme-voice .v-bar:nth-child(2){height:45%}
.theme-voice .v-bar:nth-child(3){height:78%}
.theme-voice .v-bar:nth-child(4){height:60%}
.theme-voice .v-bar:nth-child(5){height:92%}
.theme-voice .v-bar:nth-child(6){height:35%}
.theme-voice .v-bar:nth-child(7){height:88%}
.theme-voice .v-bar:nth-child(8){height:50%}
.theme-voice .v-bar:nth-child(9){height:75%}
.theme-voice .v-bar:nth-child(10){height:42%}
.theme-voice .v-bar:nth-child(11){height:68%}
.theme-voice .v-bar:nth-child(12){height:30%}
.theme-voice .v-bar:nth-child(13){height:55%}
.theme-voice .v-bar:nth-child(14){height:82%}
.theme-voice .v-bar:nth-child(15){height:48%}

.theme-aws{background:linear-gradient(135deg,#0a0f1a 0%,#0a0a0a 100%);position:relative}
.theme-aws::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(250,80,0,.18) 1px,transparent 1px),linear-gradient(90deg,rgba(250,80,0,.18) 1px,transparent 1px);background-size:80px 80px;opacity:.5;mask:linear-gradient(180deg,transparent,#000 30%,#000 70%,transparent)}
.theme-aws .cloud{position:absolute;top:55%;left:50%;transform:translate(-50%,-50%);width:60%;height:30%;background:radial-gradient(ellipse,rgba(255,153,0,.5) 0%,transparent 70%);border-radius:50%;filter:blur(40px)}

.theme-aperol{background:radial-gradient(circle at 50% 55%,#ff6b1a 0%,#cd2349 50%,#1a0a0a 100%)}
.theme-aperol .glow1{position:absolute;top:30%;left:50%;width:80%;height:60%;background:radial-gradient(circle,rgba(255,153,0,.5),transparent 60%);transform:translate(-50%,-50%);border-radius:50%;filter:blur(60px)}

.theme-gpt{background:radial-gradient(circle at 50% 50%,#1a0a1a 0%,#0a0a0a 90%)}
.theme-gpt .g-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:160px;height:160px;background:radial-gradient(circle,#FA5000,#CD2349);border-radius:50%;box-shadow:0 0 120px rgba(250,80,0,.6)}
.gfx.story .theme-gpt .g-core{width:240px;height:240px;box-shadow:0 0 200px rgba(250,80,0,.7)}
.theme-gpt .g-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid rgba(250,80,0,.25);border-radius:50%}
.theme-gpt .g-r1{width:280px;height:280px}
.theme-gpt .g-r2{width:440px;height:440px;border-color:rgba(250,80,0,.18)}
.theme-gpt .g-r3{width:640px;height:640px;border-color:rgba(250,80,0,.12)}
.gfx.story .theme-gpt .g-r1{width:400px;height:400px}
.gfx.story .theme-gpt .g-r2{width:620px;height:620px}
.gfx.story .theme-gpt .g-r3{width:880px;height:880px}

.theme-rrss{background:radial-gradient(circle at 50% 50%,#1a1a0d 0%,#0a0a0a 90%)}
.theme-rrss .hub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:140px;height:140px;background:linear-gradient(135deg,#FA5000,#CD2349);border-radius:32px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:3.2rem;color:#fff;box-shadow:0 0 80px rgba(250,80,0,.5)}
.gfx.story .theme-rrss .hub{width:200px;height:200px;font-size:4.5rem}
.theme-rrss .orbit{position:absolute;top:50%;left:50%;border:1.5px dashed rgba(250,80,0,.2);border-radius:50%;transform:translate(-50%,-50%)}
.theme-rrss .o1{width:420px;height:420px}
.theme-rrss .o2{width:620px;height:620px;border-color:rgba(250,80,0,.12)}
.gfx.story .theme-rrss .o1{width:600px;height:600px}
.gfx.story .theme-rrss .o2{width:880px;height:880px}
.theme-rrss .micon{position:absolute;width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:1.4rem;font-weight:700;color:#fff;box-shadow:0 10px 25px rgba(0,0,0,.5)}
.theme-rrss .mi-ig{top:50%;left:calc(50% - 210px);transform:translateY(-50%);background:linear-gradient(135deg,#833AB4,#FD1D1D,#FCB045)}
.theme-rrss .mi-fb{top:calc(50% - 210px);left:50%;transform:translateX(-50%);background:#1877F2}
.theme-rrss .mi-wa{top:50%;left:calc(50% + 210px);transform:translate(-100%,-50%);background:#25D366}
.theme-rrss .mi-tk{top:calc(50% + 210px);left:50%;transform:translateX(-50%);background:#000;border:2px solid #fff}
.gfx.story .theme-rrss .mi-ig{left:calc(50% - 300px)}
.gfx.story .theme-rrss .mi-fb{top:calc(50% - 300px)}
.gfx.story .theme-rrss .mi-wa{left:calc(50% + 300px)}
.gfx.story .theme-rrss .mi-tk{top:calc(50% + 300px)}
</style>
</head>
