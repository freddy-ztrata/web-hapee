server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy: Anthropic Claude API
    location /api/chat {
        # Reject anything that isn't POST
        limit_except POST { deny all; }

        proxy_pass https://api.anthropic.com/v1/messages;
        proxy_ssl_server_name on;
        proxy_set_header Host api.anthropic.com;
        proxy_set_header Content-Type "application/json";
        proxy_set_header x-api-key "${ANTHROPIC_API_KEY}";
        proxy_set_header anthropic-version "2023-06-01";

        # Remove browser headers that Anthropic doesn't need
        proxy_set_header Origin "";
        proxy_set_header Referer "";
        proxy_set_header Cookie "";

        # Timeouts for long AI responses
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # Reverse proxy: ElevenLabs TTS (streaming)
    location ~ ^/api/tts/(.+)$ {
        limit_except POST { deny all; }

        proxy_pass https://api.elevenlabs.io/v1/text-to-speech/$1/stream;
        proxy_ssl_server_name on;
        proxy_set_header Host api.elevenlabs.io;
        proxy_set_header Content-Type "application/json";
        proxy_set_header xi-api-key "${ELEVENLABS_API_KEY}";

        proxy_set_header Origin "";
        proxy_set_header Referer "";
        proxy_set_header Cookie "";

        # Streaming support
        proxy_buffering off;
        proxy_read_timeout 60s;
    }
}
