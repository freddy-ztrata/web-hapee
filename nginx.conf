server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver — Docker internal DNS (external DNS unreachable from container)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Static files — clean URLs: try $uri, then $uri.html, then index.html
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Reverse proxy: Hapee app (checkout público de planes — pricing oculto).
    # Inyecta la api key server-side (misma técnica que /api/chat): sin la env
    # var SAAS_PUBLIC_API_KEY en Dokploy, la app rechaza todo con 404 (fail-secure).
    location /api/saas/ {
        limit_except GET POST { deny all; }

        set $hapee_upstream https://app.zentru.ai;
        rewrite ^/api/saas/(.*)$ /api/public/saas/$1 break;
        proxy_pass $hapee_upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host app.zentru.ai;
        proxy_set_header X-Public-Api-Key "${SAAS_PUBLIC_API_KEY}";
        proxy_set_header Origin "";
        proxy_set_header Referer "";
        proxy_set_header Cookie "";
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Reverse proxy: Anthropic Claude API
    location /api/chat {
        limit_except POST { deny all; }

        set $anthropic_upstream https://api.anthropic.com;
        proxy_pass $anthropic_upstream/v1/messages;
        proxy_ssl_server_name on;
        proxy_set_header Host api.anthropic.com;
        proxy_set_header Content-Type "application/json";
        proxy_set_header x-api-key "${ANTHROPIC_API_KEY}";
        proxy_set_header anthropic-version "2023-06-01";
        proxy_set_header Origin "";
        proxy_set_header Referer "";
        proxy_set_header Cookie "";
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # Reverse proxy: ElevenLabs TTS (streaming)
    location ~ ^/api/tts/(.+)$ {
        limit_except POST { deny all; }

        set $voice_id $1;
        set $eleven_upstream https://api.elevenlabs.io;
        proxy_pass $eleven_upstream/v1/text-to-speech/$voice_id/stream;
        proxy_ssl_server_name on;
        proxy_set_header Host api.elevenlabs.io;
        proxy_set_header Content-Type "application/json";
        proxy_set_header xi-api-key "${ELEVENLABS_API_KEY}";
        proxy_set_header Origin "";
        proxy_set_header Referer "";
        proxy_set_header Cookie "";
        proxy_set_header Accept-Encoding "";
        proxy_buffering off;
        proxy_read_timeout 60s;
    }
}
